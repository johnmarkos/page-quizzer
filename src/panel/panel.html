<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageQuizzer</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>PageQuizzer</h1>
      <nav>
        <button class="nav-btn active" data-view="quiz">Quiz</button>
        <button class="nav-btn" data-view="history">History</button>
        <button class="nav-btn" data-view="settings">Settings</button>
      </nav>
    </header>

    <!-- Quiz View -->
    <div id="quiz-view" class="view active">
      <div id="quiz-idle">
        <p>Generate a quiz from the current page.</p>
        <button id="generate-btn" class="primary-btn">Generate Quiz</button>
      </div>

      <div id="quiz-loading" class="hidden">
        <div class="spinner"></div>
        <p id="loading-status">Extracting content...</p>
      </div>

      <div id="quiz-ready" class="hidden">
        <p id="ready-info"></p>
        <button id="start-btn" class="primary-btn">Start Quiz</button>
      </div>

      <div id="quiz-question" class="hidden">
        <div id="progress-bar"><div id="progress-fill"></div></div>
        <p id="progress-text"></p>
        <h2 id="question-text"></h2>
        <div id="options-container"></div>
        <div id="feedback" class="hidden">
          <p id="feedback-text"></p>
          <p id="explanation-text"></p>
          <button id="next-btn" class="primary-btn">Next</button>
        </div>
        <button id="skip-btn" class="secondary-btn">Skip</button>
      </div>

      <div id="quiz-complete" class="hidden">
        <h2>Quiz Complete!</h2>
        <div id="score-display"></div>
        <div id="score-breakdown"></div>
        <button id="retry-btn" class="primary-btn">Retry</button>
        <button id="new-quiz-btn" class="secondary-btn">New Quiz</button>
      </div>

      <div id="quiz-error" class="hidden">
        <p id="error-text" class="error"></p>
        <button id="error-dismiss-btn" class="secondary-btn">OK</button>
      </div>
    </div>

    <!-- History View -->
    <div id="history-view" class="view hidden">
      <div id="history-list"></div>
      <p id="history-empty">No quiz history yet.</p>
    </div>

    <!-- Settings View -->
    <div id="settings-view" class="view hidden">
      <div class="setting-group">
        <label for="provider-select">Provider</label>
        <select id="provider-select">
          <option value="anthropic">Anthropic (Claude)</option>
        </select>
      </div>
      <div class="setting-group">
        <label for="api-key-input">API Key</label>
        <input type="password" id="api-key-input" placeholder="Enter API key">
      </div>
      <div class="setting-group">
        <button id="test-connection-btn" class="secondary-btn">Test Connection</button>
        <span id="connection-status"></span>
      </div>
      <div class="setting-group">
        <label for="density-slider">Question Density: <span id="density-value">3</span> per 100 words</label>
        <input type="range" id="density-slider" min="1" max="10" value="3">
      </div>
      <div class="setting-group">
        <label for="max-questions-input">Max Questions</label>
        <input type="number" id="max-questions-input" min="5" max="100" value="50">
      </div>
      <button id="save-settings-btn" class="primary-btn">Save Settings</button>
    </div>
  </div>

  <script src="../../dist/panel.js" type="module"></script>
</body>
</html>
